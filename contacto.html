<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto | Atelier Motors</title>
    <link rel="stylesheet" href="assets/style.css" />
    <link rel="icon" href="Logo Atelier.ico" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">
          <img src="LogoNombreDerecha.png" alt="Logo de mi marca" />
        </div>
        <ul class="nav-links">
          <li><a href="index.html">Inicio</a></li>
          <li><a href="catalogo.html">Catálogo</a></li>
          <li><a href="nosotros.html">Nosotros</a></li>
          <li>
            <a href="contacto.html" style="color: var(--accent-gold)"
              >Contacto</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <main class="section-padding">
      <h1 class="section-title">Hablemos</h1>
      <div class="contact-container">
        <div>
          <h3 style="margin-bottom: 1rem; color: var(--accent-gold)">
            Visita nuestro Showroom
          </h3>
          <p style="color: var(--text-muted); margin-bottom: 2rem">
            Avenida constitución 5<br />33211 Gijón, España
          </p>

          <h3 style="margin-bottom: 1rem; color: var(--accent-gold)">
            Horario Exclusivo
          </h3>
          <p style="color: var(--text-muted); margin-bottom: 2rem">
            Lunes a Viernes: 10:00 - 20:00<br />Sábados: Con cita previa
          </p>
        </div>

        <form action="#" method="POST">
          <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" name="nombre" required />
          </div>
          <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="mensaje">Mensaje o Modelo de Interés</label>
            <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
          </div>
          <button type="submit" class="btn" style="width: 100%">
            Solicitar Información
          </button>
        </form>
      </div>
    </main>

    <footer>
      <p>&copy; 2026 Atelier Motors. Todos los derechos reservados.</p>
    </footer>
  </body>
</html>
